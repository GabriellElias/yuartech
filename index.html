<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>YuarTech AI | Consultoria Estratégica</title>
    
    <!-- Bibliotecas Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root { --app-height: 100%; }

        html, body {
            overflow: hidden;
            height: 100%;
            width: 100%;
            position: fixed;
            background: #fff;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #fdfdfd; 
            display: flex; 
            flex-direction: column; 
            height: var(--app-height);
        }

        /* Estilização Premium */
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid #f1f5f9; }
        .bubble-user { background: #2563eb; color: white; border-radius: 1.25rem 1.25rem 0.2rem 1.25rem; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.15); }
        .bubble-ai { background: white; color: #1e293b; border: 1px solid #f1f5f9; border-radius: 1.25rem 1.25rem 1.25rem 0.2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Botões */
        .tip-btn { border: 1px solid #e2e8f0; transition: all 0.2s; white-space: nowrap; font-weight: 700; }
        .tip-btn:hover { background: #f8fafc; border-color: #cbd5e1; }
        .wa-btn { background: #22c55e; color: white; font-weight: 800; border-radius: 1rem; transition: all 0.3s; cursor: pointer; }
        .wa-btn:hover { background: #16a34a; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(34, 197, 94, 0.25); }

        textarea { scrollbar-width: none; -ms-overflow-style: none; max-height: 120px; }
        textarea::-webkit-scrollbar { display: none; }

        /* Tabelas Markdown */
        .markdown-content table { width: 100%; border-radius: 10px; overflow: hidden; border: 1px solid #f1f5f9; margin: 12px 0; font-size: 13px; }
        .markdown-content th { background: #f8fafc; padding: 10px; text-align: left; font-weight: 800; color: #64748b; border-bottom: 1px solid #f1f5f9; }
        .markdown-content td { padding: 12px 10px; border-bottom: 1px solid #f8fafc; }
        .markdown-content strong { color: #2563eb; }

        .typing-dots { display: flex; gap: 4px; padding: 8px; }
        .dot { width: 5px; height: 5px; background: #cbd5e1; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        footer { padding-bottom: env(safe-area-inset-bottom, 1rem); }
    </style>
</head>
<body class="text-slate-900">

    <!-- Onboarding -->
    <div id="onboarding" class="fixed inset-0 z-[200] bg-white flex items-center justify-center p-6 transition-all duration-500">
        <div class="max-w-md w-full text-center slide-up">
            <div class="w-24 h-24 bg-blue-600 rounded-[2.5rem] flex items-center justify-center text-white mx-auto mb-6 shadow-2xl rotate-6">
                <i class="fas fa-bolt text-4xl"></i>
            </div>
            <h2 class="text-4xl font-extrabold tracking-tighter text-slate-900 mb-2">YuarTech AI</h2>
            <p class="text-slate-500 font-medium mb-12 uppercase text-xs tracking-[0.2em]">Consultoria Estratégica Digital</p>
            <button onclick="startChat()" class="w-full bg-slate-900 text-white font-bold py-5 rounded-2xl shadow-xl active:scale-95 transition-all text-lg uppercase">
                Iniciar Atendimento
            </button>
        </div>
    </div>

    <!-- Chat Interface -->
    <div id="chat-view" class="hidden flex flex-col h-full bg-[#fdfdfd] overflow-hidden">
        <header class="glass flex-none px-6 py-5 flex items-center justify-between z-50">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-lg"><i class="fas fa-robot text-lg"></i></div>
                <div>
                    <h1 class="font-black text-slate-900 text-sm tracking-tight uppercase">Yuar Assistant</h1>
                    <div class="flex items-center gap-1.5"><span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span><span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Sistema Ativo</span></div>
                </div>
            </div>
            <button onclick="confirmExit()" class="bg-red-50 text-red-600 px-5 py-2.5 rounded-2xl text-[10px] font-black tracking-widest uppercase hover:bg-red-600 hover:text-white transition-all">
                Encerrar
            </button>
        </header>

        <main id="chat-container" class="flex-1 overflow-y-auto p-4 sm:p-10 space-y-8 bg-[#fdfdfd] no-scrollbar"></main>

        <footer class="flex-none p-4 bg-white border-t border-slate-100 shadow-2xl z-50">
            <div class="max-w-4xl mx-auto">
                <div id="tips-area" class="flex overflow-x-auto gap-2 mb-4 pb-1 no-scrollbar"></div>
                
                <form id="chat-form" class="flex items-end gap-3 bg-slate-50 rounded-[2rem] p-2.5 focus-within:bg-white border border-slate-100 transition-all shadow-sm">
                    <textarea id="user-input" rows="1" placeholder="Diga algo à YuarTech..." class="flex-1 bg-transparent border-0 px-6 py-4 outline-none resize-none text-[16px] leading-relaxed font-medium disabled:opacity-50"></textarea>
                    <button type="submit" id="send-btn" class="w-14 h-14 flex-none bg-blue-600 text-white rounded-full flex items-center justify-center shadow-xl active:scale-90 transition-all disabled:bg-slate-300">
                        <i class="fas fa-arrow-up text-xl"></i>
                    </button>
                </form>
                
                <div class="mt-3 px-4 flex justify-between items-center">
                    <p id="session-tag" class="text-[9px] font-black text-slate-300 uppercase tracking-widest">ID: ----</p>
                    <p class="text-[9px] text-slate-300 font-bold italic">Processamento AI de Elite</p>
                </div>
            </div>
        </footer>
    </div>

    <script>
        /**
         * CONFIGURAÇÕES CORE
         */
        const GROQ_KEY = "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"; 
        const EMAILJS_SVID = "service_ib209th";
        const EMAILJS_TPID = "template_ev8l22v";
        const EMAILJS_PKEY = "eyrQGdo_Ig5K9r3ea"; 
        const ADMIN_EMAIL = "gabriellelnmarques3@gmail.com";

        emailjs.init(EMAILJS_PKEY);

        // Ajuste de altura dinâmico para evitar bugs de teclado mobile
        const updateHeight = () => {
            const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
            document.documentElement.style.setProperty('--app-height', `${vh}px`);
        };
        if (window.visualViewport) window.visualViewport.addEventListener('resize', updateHeight);
        window.addEventListener('resize', updateHeight);
        updateHeight();

        const geoDatabase = {
            "Acre": ["Rio Branco", "Cruzeiro do Sul", "Sena Madureira", "Tarauacá", "Feijó", "Brasiléia", "Senador Guiomard", "Plácido de Castro", "Xapuri", "Rodrigues Alves"],
            "Amazonas": ["Manaus", "Parintins", "Itacoatiara", "Manacapuru", "Coari", "Tabatinga", "Maués", "Tefé", "Manicoré", "Humaitá", "Iranduba", "Lábrea"]
        };

        let user = { name: '', email: '', id: '', state: '', city: '' };
        let history = [];
        let step = 'name';
        let isProcessing = false;

        function startChat() {
            document.getElementById('onboarding').classList.add('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                document.getElementById('onboarding').classList.add('hidden');
                document.getElementById('chat-view').classList.remove('hidden');
                addMessage("Olá! Seja muito bem-vindo ao **Grupo YuarTech AI**. 👋 Como você se chama para darmos início?", false);
                user.id = Math.random().toString(36).substring(2, 9).toUpperCase();
                document.getElementById('session-tag').innerText = `ID: ${user.id}`;
                document.getElementById('user-input').focus();
                updateHeight();
            }, 500);
        }

        /**
         * METODOLOGIA DE DETECÇÃO DE NOME
         */
        function extractFirstName(text) {
            const stops = ['ola', 'olá', 'oi', 'bom', 'boa', 'dia', 'tarde', 'noite', 'meu', 'nome', 'é', 'me', 'cham', 'chamo', 'sou'];
            let words = text.toLowerCase().replace(/[.,!?;:]/g, '').split(/\s+/);
            let filtered = words.filter(w => !stops.includes(w) && w.length > 2);
            let finalName = (filtered.length > 0) ? filtered[0] : words[0];
            return finalName.charAt(0).toUpperCase() + finalName.slice(1).toLowerCase();
        }

        /**
         * METODOLOGIA DE CONVERSAÇÃO (GROQ AI)
         */
        async function askAI(text, retryCount = 0) {
            const systemPrompt = `Você é o estrategista oficial do Grupo YuarTech. Linguagem Premium, Direta e Persuasiva.
            CLIENTE: ${user.name} | Localização: ${user.city}/${user.state}.

            METODOLOGIA DE PREÇOS ATUALIZADA (Use tabelas para apresentar):
            1. INVESTIMENTO PROFISSIONAL (ESCALA): R$ 1500/mês. 
               - PROMOÇÃO EXCLUSIVA: Na compra deste plano, o cliente ganha 1 MÊS GRÁTIS da ferramenta de ChatBot Automático Ultra.

            2. PLANOS CHATBOT INDIVIDUAL (Mensagens Ilimitadas):
               - Básico: R$ 80/mês (Apenas Plataforma).
               - Pro: R$ 110/mês (Plataforma + WhatsApp).
               - Ultra: R$ 150/mês (Plataforma + WhatsApp + IA de Venda e Planejamento).

            Foque em vender autoridade. Responda de forma humana e use **negrito** para termos importantes.
            GATILHO WHATSAPP: Se o cliente quiser fechar, falar com humano ou suporte, inicie a resposta com "[TRIGGER_WHATSAPP]".`;

            try {
                const response = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-preview-09-2025:generateContent?key=", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // Nota: O prompt pediu especificamente Groq, mas as instruções gerais pedem Gemini no ambiente Preview.
                    // Para garantir que funcione com a chave do usuário no endpoint Groq:
                });
                
                // Redirecionando para o endpoint Groq como solicitado pelo usuário
                const groqRes = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${GROQ_KEY}`
                    },
                    body: JSON.stringify({ 
                        model: "llama-3.3-70b-versatile", 
                        messages: [{ role: "system", content: systemPrompt }, ...history, { role: "user", content: text }],
                        temperature: 0.6 
                    })
                });

                if (!groqRes.ok && retryCount < 5) {
                    const delay = Math.pow(2, retryCount) * 1000;
                    await new Promise(r => setTimeout(r, delay));
                    return askAI(text, retryCount + 1);
                }

                const data = await groqRes.json();
                return data.choices[0].message.content;
            } catch (err) {
                return "Houve um erro técnico na ligação. Por favor, tente enviar novamente.";
            }
        }

        async function handleFlow(text) {
            if (isProcessing) return;

            if (step === 'name') {
                user.name = extractFirstName(text);
                addMessage(text, true);
                history.push({ role: "user", content: text });
                step = 'email';
                setTimeout(() => { 
                    addMessage(`É um privilégio conhecer-te, **${user.name}**! Qual o teu melhor e-mail para contacto?`, false); 
                }, 600);
            } 
            else if (step === 'email') {
                if (!text.includes('@') || !text.includes('.')) { 
                    addMessage(text, true); 
                    addMessage("Ops! O e-mail parece inválido. Poderia digitar o endereço completo?", false); 
                    return; 
                }
                user.email = text;
                addMessage(text, true);
                history.push({ role: "user", content: text });
                step = 'location';
                setTimeout(showLocationPicker, 600);
            }
            else if (step === 'chatting') {
                addMessage(text, true);
                history.push({ role: "user", content: text });
                setLoading(true);
                const aiRes = await askAI(text);
                setLoading(false);
                processAIResponse(aiRes);
            }
        }

        function showLocationPicker() {
            const div = document.createElement('div');
            div.className = `flex justify-start mb-6 slide-up`;
            div.id = "geo-picker-ui";
            div.innerHTML = `
                <div class="bubble-ai px-6 py-6 max-w-[90%] w-full shadow-lg border-2 border-blue-50">
                    <p class="font-bold mb-4 text-sm text-slate-700 text-center uppercase tracking-widest">Localização</p>
                    <div class="space-y-4">
                        <select id="s-state" onchange="updateCities()" class="w-full border-2 border-slate-100 p-3.5 rounded-xl text-sm font-medium outline-none">
                            <option value="Acre">Acre</option>
                            <option value="Amazonas">Amazonas</option>
                        </select>
                        <select id="s-city" class="w-full border-2 border-slate-100 p-3.5 rounded-xl text-sm font-medium outline-none"></select>
                        <button onclick="confirmLocation()" class="w-full bg-slate-900 text-white font-black py-4 rounded-xl shadow-xl active:scale-95 text-xs uppercase tracking-widest mt-2">Confirmar Região</button>
                    </div>
                </div>`;
            document.getElementById('chat-container').appendChild(div);
            updateCities();
            scrollToBottom();
        }

        function updateCities() {
            const s = document.getElementById('s-state').value;
            const c = document.getElementById('s-city');
            c.innerHTML = '';
            geoDatabase[s].forEach(city => {
                const opt = document.createElement('option'); opt.value = city; opt.innerText = city;
                c.appendChild(opt);
            });
        }

        function confirmLocation() {
            user.state = document.getElementById('s-state').value;
            user.city = document.getElementById('s-city').value;
            document.getElementById('geo-picker-ui').remove();
            step = 'chatting';
            const msg = `Localização confirmada: **${user.city}, ${user.state}**. Perfeito! Agora diga-me, qual o seu objetivo hoje: Investimento em Escala (R$1500) ou contratar um ChatBot Individual?`;
            addMessage(msg, false);
            history.push({ role: "assistant", content: msg });
            updateTips(["Investimento Profissional", "ChatBot Individual", "Ver Preços"]);
        }

        function processAIResponse(text) {
            if (text.includes("[TRIGGER_WHATSAPP]")) {
                const clean = text.replace("[TRIGGER_WHATSAPP]", "").trim();
                addMessage(clean, false);
                addWAButton();
                history.push({ role: "assistant", content: clean });
            } else {
                addMessage(text, false);
                history.push({ role: "assistant", content: text });
            }
            updateTips(["Investimento Profissional", "Promoção R$1500", "Falar com Humano"]);
        }

        function addMessage(text, isU) {
            const div = document.createElement('div');
            div.className = `flex ${isU ? 'justify-end' : 'justify-start'} mb-6 slide-up`;
            div.innerHTML = `<div class="${isU ? 'bubble-user' : 'bubble-ai'} px-6 py-4 max-w-[85%] font-medium shadow-sm overflow-x-auto markdown-content"><div>${isU ? text : marked.parse(text)}</div></div>`;
            document.getElementById('chat-container').appendChild(div);
            scrollToBottom();
        }

        function addWAButton() {
            const div = document.createElement('div');
            div.className = 'flex justify-start mb-4 slide-up';
            const msg = encodeURIComponent(`Olá! Tenho interesse em fechar um plano.\nID: ${user.id}\nNome: ${user.name}`);
            const url = `https://wa.me/5568992171233?text=${msg}`;
            div.innerHTML = `<button onclick="handleWASend('${url}')" class="wa-btn px-10 py-5 shadow-2xl flex items-center gap-4 text-xs uppercase tracking-widest"><i class="fab fa-whatsapp text-2xl"></i> FALAR COM ADMINISTRADOR</button>`;
            document.getElementById('chat-container').appendChild(div);
            addMessage("Nota: O estudo técnico detalhado será feito pelo administrador com resposta em até **5 horas**.", false);
        }

        async function handleWASend(url) {
            await finalizeAndSend(false);
            window.open(url, '_blank');
        }

        function updateTips(tips) {
            const area = document.getElementById('tips-area'); area.innerHTML = '';
            tips.forEach(t => {
                const b = document.createElement('button');
                b.className = "tip-btn px-5 py-2.5 rounded-full text-[10px] font-black text-slate-500 bg-white uppercase tracking-tighter flex-none shadow-sm";
                b.innerText = t; b.onclick = () => { if(!isProcessing) { document.getElementById('user-input').value = t; document.getElementById('chat-form').dispatchEvent(new Event('submit')); }};
                area.appendChild(b);
            });
        }

        function setLoading(l) {
            isProcessing = l;
            const b = document.getElementById('send-btn');
            b.innerHTML = l ? '<i class="fas fa-circle-notch animate-spin"></i>' : '<i class="fas fa-arrow-up"></i>';
            b.disabled = l;
        }

        function scrollToBottom() { const c = document.getElementById('chat-container'); c.scrollTo({ top: c.scrollHeight, behavior: 'smooth' }); }

        async function finalizeAndSend(show = true) {
            let html = `<div style="font-family: sans-serif; padding: 20px; background: #f8fafc; border-radius: 15px;"><h2>Lead YuarTech V1.5</h2>`;
            history.forEach(m => { html += `<p><b>${m.role.toUpperCase()}:</b> ${m.content}</p>`; });
            html += `</div>`;
            try {
                await emailjs.send(EMAILJS_SVID, EMAILJS_TPID, { user_name: user.name, user_email: user.email, session_id: user.id, chat_html: html });
                if(show) { alert("Histórico profissional enviado com sucesso!"); window.location.reload(); }
            } catch (e) { if(show) console.error("Erro no envio:", e); }
        }

        function confirmExit() { if(confirm("Deseja encerrar e salvar o histórico estratégico?")) finalizeAndSend(); }

        // Form Listeners
        document.getElementById('chat-form').onsubmit = (e) => {
            e.preventDefault();
            const val = document.getElementById('user-input').value.trim();
            if(!val || isProcessing) return;
            document.getElementById('user-input').value = '';
            document.getElementById('user-input').style.height = 'auto';
            handleFlow(val);
        };

        const uInput = document.getElementById('user-input');
        uInput.oninput = function() { this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px'; };
        uInput.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); document.getElementById('chat-form').dispatchEvent(new Event('submit')); }};

    </script>
</body>
</html>
